<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pedidos - Admin</title>
    <link rel="stylesheet" href="styles-admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <h2>🌸 Admin Panel</h2>
                <p id="admin-name"></p>
            </div>
            <nav class="menu">
                <a href="dashboard.html" class="menu-item">
                    <span>📊</span> Dashboard
                </a>
                <a href="productos.html" class="menu-item">
                    <span>🛍️</span> Productos
                </a>
                <a href="pedidos.html" class="menu-item active">
                    <span>📦</span> Pedidos
                </a>
                <a href="#" class="menu-item" onclick="cerrarSesion()">
                    <span>🚪</span> Cerrar Sesión
                </a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="topbar">
                <h1>Gestión de Pedidos</h1>
                <div class="stats-mini">
                    <div class="stat-mini">
                        <span>Pendientes:</span>
                        <strong id="pedidos-pendientes">0</strong>
                    </div>
                    <div class="stat-mini">
                        <span>En Proceso:</span>
                        <strong id="pedidos-proceso">0</strong>
                    </div>
                </div>
            </header>

            <!-- FILTROS -->
            <div class="filters-bar">
                <input type="text" id="buscar-pedido" placeholder="🔍 Buscar por número o cliente...">
                
                <select id="filtro-estado">
                    <option value="">Todos los estados</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Confirmado">Confirmado</option>
                    <option value="Preparando">Preparando</option>
                    <option value="Enviado">Enviado</option>
                    <option value="Entregado">Entregado</option>
                    <option value="Cancelado">Cancelado</option>
                </select>

                <input type="date" id="filtro-fecha-desde" placeholder="Desde">
                <input type="date" id="filtro-fecha-hasta" placeholder="Hasta">

                <button onclick="filtrarPedidos()">Filtrar</button>
                <button class="btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
            </div>

            <!-- TABLA DE PEDIDOS -->
            <div class="table-container">
                <table class="productos-table">
                    <thead>
                        <tr>
                            <th>Nº Pedido</th>
                            <th>Cliente</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Estado Pedido</th>
                            <th>Estado Pago</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-pedidos">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 60px 20px;">
                                <div style="font-size: 48px; margin-bottom: 15px;">📦</div>
                                <h3 style="color: var(--gray); font-size: 18px;">No hay pedidos aún</h3>
                                <p style="color: var(--gray); margin-top: 10px;">
                                    Los pedidos aparecerán aquí cuando los clientes realicen compras
                                </p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL DETALLE PEDIDO -->
    <div id="modal-pedido" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h2 id="modal-titulo">Detalle del Pedido</h2>
                <button class="close-btn" onclick="cerrarModal()">✕</button>
            </div>
            
            <div id="pedido-detalle" style="padding: 30px;">
                <!-- Contenido dinámico -->
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="pedidos-admin.js"></script>
</body>
</html>

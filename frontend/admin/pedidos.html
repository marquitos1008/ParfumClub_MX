<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pedidos - Admin</title>
    <link rel="stylesheet" href="../styles-admin.css">
    <link rel="stylesheet" href="styles-pedidos-admin.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="admin-sidebar">
        <div class="sidebar-logo">🌸 ParfumClubMX</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="productos.html">📦 Productos</a>
            <a href="pedidos.html" class="active">🛒 Pedidos</a>
        </nav>
        <div class="sidebar-footer">
            <span id="nombre-admin"></span>
            <button onclick="cerrarSesion()">🚪 Salir</button>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div class="admin-main">
        <div class="admin-topbar">
            <h1>🛒 Gestión de Pedidos</h1>
        </div>

        <!-- Filtros y Búsqueda -->
        <div class="pedidos-toolbar">
            <div class="filtros-grupo">
                <select id="filtro-estado" onchange="aplicarFiltros()">
                    <option value="">Todos los estados</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Confirmado">Confirmado</option>
                    <option value="Preparando">Preparando</option>
                    <option value="Enviado">Enviado</option>
                    <option value="Entregado">Entregado</option>
                    <option value="Cancelado">Cancelado</option>
                </select>

                <input type="date" id="filtro-desde" onchange="aplicarFiltros()">
                <input type="date" id="filtro-hasta" onchange="aplicarFiltros()">

                <button class="btn-limpiar" onclick="limpiarFiltros()">
                    ✖️ Limpiar
                </button>
            </div>

            <div class="busqueda-pedido">
                <input type="text" id="buscar-pedido" 
                       placeholder="Buscar por # pedido o cliente..."
                       oninput="buscarPedido(this.value)">
            </div>
        </div>

        <!-- Estadísticas rápidas -->
        <div class="stats-pedidos">
            <div class="stat-pedido-card">
                <span class="stat-numero" id="stat-total">0</span>
                <span class="stat-label">Total Pedidos</span>
            </div>
            <div class="stat-pedido-card pendiente">
                <span class="stat-numero" id="stat-pendientes">0</span>
                <span class="stat-label">Pendientes</span>
            </div>
            <div class="stat-pedido-card enviado">
                <span class="stat-numero" id="stat-enviados">0</span>
                <span class="stat-label">Enviados</span>
            </div>
            <div class="stat-pedido-card entregado">
                <span class="stat-numero" id="stat-entregados">0</span>
                <span class="stat-label">Entregados</span>
            </div>
        </div>

        <!-- Tabla de Pedidos -->
        <div class="tabla-container">
            <table class="tabla-pedidos">
                <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Productos</th>
                        <th>Total</th>
                        <th>Pago</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-pedidos">
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px;">
                            ⏳ Cargando pedidos...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Detalle/Editar Pedido -->
    <div id="modal-pedido-admin" class="modal-overlay" style="display: none;">
        <div class="modal-admin-content">
            <button class="btn-cerrar-modal" onclick="cerrarModal()">✖️</button>
            <div id="contenido-modal-admin"></div>
        </div>
    </div>

    <script src="pedidos-admin.js"></script>
</body>
</html>
